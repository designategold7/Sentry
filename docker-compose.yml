version: '3.8'
services:
  db:
    build: ./docker/database/
    environment:
      - POSTGRES_DB=sentry
      - POSTGRES_USER=sentry
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s # This gives Postgres 30 seconds to boot before counting failures
    restart: always
  redis:
    image: redis:3.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./.data/redis:/data
    ports:
      - "6379:6379"
    restart: always
  web:
    build: .
    command: python manage.py serve -r
    volumes:
      - .:/opt/sentry
    ports:
      - "8686:8686"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
  frontend:
    build: ./frontend/
    environment:
      - NODE_ENV=docker
    command: npm run serve
    volumes:
      - ./frontend:/opt/frontend
      - /opt/frontend/node_modules
    ports:
      - "8080:8080"
      - "8687:8687"
    depends_on:
      - web
    restart: always
  bot:
    build: .
    command: python manage.py bot -e docker
    volumes:
      - .:/opt/sentry
    ports:
      - "7171:7171"
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    restart: always
  workers:
    build: .
    command: python manage.py workers
    volumes:
      - .:/opt/sentry
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    restart: on-failure